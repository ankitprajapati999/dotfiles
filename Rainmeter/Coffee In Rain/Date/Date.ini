[Rainmeter]
Update=1000
Author=Aetheruis

[Variables]
RotateAngle=1
Scale=1.06


[Metadata]
Name=Coffee In Rain
Version=1.0



[MeasureDay]
Measure=Time
Format=%A

[MeasureDate]
Measure=Time
Format=%d  %B  


[MeterDate]
Meter=String
MeasureName=MeasureDate
StringAlign=Centre
Y=60
X=270
Text=- %1 -
FontColor=41, 29, 65
FontFace=Avant Pixel
FontSize=30
DynamicVariables=1
AntiAlias=1



[MeterDay]
Meter=String
MeasureName=MeasureDay
StringAlign=Center
X=400
Y=0
Text=%1
InlineSetting=GradientColor | -270 | 41, 29, 65 ; 0.65 | 204, 133, 79 ; 1.0


FontColor=20, 25, 59
FontFace=Avant Pixel
FontSize=60
DynamicVariables=1
AntiAlias=1








