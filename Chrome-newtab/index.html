<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- ====== PRIMARY SEO ====== -->
    <title>HomePage</title>
    <meta name="author" content="lightning" />
    <meta name="theme-color" content="#E8734A" />
    <meta name="color-scheme" content="dark" />
    <meta name="application-name" content="HomePage" />
    <meta name="apple-mobile-web-app-title" content="Firewatch HomePage" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <meta property="og:image" content="/wallpapers/sunset-bg.jpg" />
    <meta property="og:image:width" content="1920" />
    <meta property="og:image:height" content="1080" />


    <!-- ====== FAVICONS & MANIFEST ====== -->
    <link rel="icon" type="image/jpg" href="icon.jpg" />
    <link rel="apple-touch-icon" href="icon.jpg" />
    <link rel="manifest" href="manifest.json" />

    <!-- ====== FONTS ====== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600&family=Caveat:wght@500&display=swap"
        rel="stylesheet" />

    <!-- ====== PRELOAD CRITICAL ASSETS ====== -->
    <link rel="preload" href="wallpapers/sunset-bg.jpg" as="image" />
    <link rel="preload" href="style.css" as="style" />
    <link rel="preload" href="script.js" as="script" />

    <link rel="stylesheet" href="style.css" />
</head>

<body data-theme="sunset" itemscope itemtype="https://schema.org/WebApplication">

    <!-- Background Layers -->
    <div class="bg-layer bg-early-morning"></div>
    <div class="bg-layer bg-morning"></div>
    <div class="bg-layer bg-noon"></div>
    <div class="bg-layer bg-sunset"></div>
    <div class="bg-layer bg-evening"></div>
    <div class="bg-layer bg-night"></div>
    
    <!-- Particle Canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- ====== WELCOME SCREEN ====== -->
    <div class="welcome-overlay" id="welcome-overlay">
        <div class="welcome-icon">
            <svg viewBox="0 0 64 64">
                <polygon points="32,4 36,24 32,20 28,24" />
                <rect x="29" y="20" width="6" height="28" rx="1" />
                <rect x="26" y="36" width="12" height="8" rx="1" />
                <line x1="26" y1="38" x2="38" y2="38" />
                <line x1="26" y1="40" x2="38" y2="40" />
                <line x1="26" y1="42" x2="38" y2="42" />
                <line x1="32" y1="48" x2="24" y2="60" />
                <line x1="32" y1="48" x2="40" y2="60" />
                <line x1="24" y1="60" x2="40" y2="60" />
            </svg>
        </div>
        <h1 class="welcome-title" itemprop="name">Welcome, Ankit</h1>
        <p class="welcome-sub" itemprop="description">This is your brand new world - firing the chimney in winter nights!!
        </p>
        <div class="welcome-line"></div>
        <div class="welcome-credit">made by <span class="welcome-credit-name">Lightning Ankit with hasya</span></div>
    </div>

    <!-- ====== DASHBOARD ====== -->
    <main class="dashboard" id="dashboard" data-clock-pos="center">

        <!-- Unified Music Status — top-left -->
        <div class="lofi-widget music-status-widget" id="lofi-widget">
            <div class="lofi-icon music-status-icon">
                <svg viewBox="0 0 24 24" id="music-status-svg">
                    <title>Music Status</title>
                    <path d="M9 18V5l12-2v13" />
                    <circle cx="6" cy="18" r="3" />
                    <circle cx="18" cy="16" r="3" />
                </svg>
            </div>
            <div class="lofi-info">
                <span class="lofi-status" id="lofi-status">No Music</span>
                <div class="lofi-scroll-container">
                    <span class="lofi-track-name" id="lofi-track-name">Radio Offline</span>
                    <!-- Duplicate for seamless looping -->
                    <span class="lofi-track-name lofi-track-duplicate" id="lofi-track-name-dup" aria-hidden="true">Radio
                        Offline</span>
                </div>
            </div>
        </div>

        <!-- Settings — top-right -->
        <div class="settings-area">
            <button class="settings-btn" id="btn-clock-pos" aria-label="Move clock">
                <svg viewBox="0 0 24 24">
                    <title>Move Clock Position</title>
                    <polyline points="5 9 2 12 5 15" />
                    <polyline points="9 5 12 2 15 5" />
                    <polyline points="19 9 22 12 19 15" />
                    <polyline points="9 19 12 22 15 19" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <line x1="12" y1="2" x2="12" y2="22" />
                </svg>
                <span>Move</span>
            </button>
            <button class="settings-btn" id="btn-theme" aria-label="Switch theme">
                <svg viewBox="0 0 24 24">
                    <title>Change Visual Theme</title>
                    <circle cx="12" cy="12" r="4" />
                    <path
                        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
                </svg>
                <span>Theme</span>
            </button>
        </div>

        <!-- Clock — center -->
        <div class="clock-container" id="clock-container">
            <div class="clock-time" id="clock-time">
                <span id="clock-hours">00</span><span class="clock-separator">:</span><span
                    id="clock-minutes">00</span><span class="clock-separator">:</span><span
                    id="clock-seconds">00</span><span class="clock-ampm" id="clock-ampm">AM</span>
            </div>
            <div class="clock-date" id="clock-date">Loading…</div>
        </div>

        <!-- ====== TOOLBAR — bottom center ====== -->
        <div class="toolbar" id="toolbar">
            <button class="toolbar-btn" id="btn-pomodoro" aria-label="Pomodoro">
                <svg viewBox="0 0 24 24">
                    <title>Start Study Pomodoro Timer</title>
                    <circle cx="12" cy="13" r="8" />
                    <path d="M12 9v4l2 2" />
                    <path d="M9 2h6" />
                    <line x1="12" y1="2" x2="12" y2="5" />
                </svg>
                <span>Pomodoro</span>
            </button>
            <div class="toolbar-divider"></div>
            <button class="toolbar-btn" id="btn-stopwatch" aria-label="Stopwatch">
                <svg viewBox="0 0 24 24">
                    <title>Start Study Timer Stopwatch</title>
                    <circle cx="12" cy="13" r="8" />
                    <line x1="12" y1="9" x2="12" y2="13" />
                    <line x1="12" y1="13" x2="15" y2="13" />
                    <path d="M9 2h6" />
                </svg>
                <span>Stopwatch</span>
            </button>
            <div class="toolbar-divider"></div>
            <button class="toolbar-btn" id="btn-music" aria-label="Firewatch OST">
                <svg viewBox="0 0 24 24">
                    <title>Play OST</title>
                    <path d="M9 18V5l12-2v13" />
                    <circle cx="6" cy="18" r="3" />
                    <circle cx="18" cy="16" r="3" />
                </svg>
                <span>OST</span>
            </button>
        </div>

        <!-- ====== POMODORO PANEL ====== -->
        <div class="panel pomodoro-panel" id="pomodoro-panel">
            <div class="pomo-header">
                <div class="panel-title">Pomodoro Timer</div>
                <div class="pomo-header-btns">
                    <button class="pomo-icon-btn" id="pomo-sound-toggle" aria-label="Toggle sound" title="Sound On">
                        <svg viewBox="0 0 24 24">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                        </svg>
                    </button>
                    <button class="pomo-icon-btn" id="pomo-settings-toggle" aria-label="Timer settings"
                        title="Settings">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Presets row -->
            <div class="pomo-presets" id="pomo-presets">
                <button class="pomo-preset active" data-focus="25" data-short="5" data-long="15">25/5</button>
                <button class="pomo-preset" data-focus="45" data-short="5" data-long="15">45/5</button>
                <button class="pomo-preset" data-focus="50" data-short="10" data-long="20">50/10</button>
                <button class="pomo-preset" data-focus="90" data-short="15" data-long="30">90/15</button>
            </div>

            <!-- Custom settings (collapsed by default) -->
            <div class="pomo-custom-settings" id="pomo-custom-settings">
                <div class="pomo-setting-row">
                    <label for="pomo-custom-focus">Focus</label>
                    <div class="pomo-setting-input-wrap">
                        <button class="pomo-stepper" data-target="pomo-custom-focus" data-dir="-1">−</button>
                        <input type="number" id="pomo-custom-focus" class="pomo-setting-input" value="25" min="1"
                            max="180" />
                        <button class="pomo-stepper" data-target="pomo-custom-focus" data-dir="1">+</button>
                        <span class="pomo-setting-unit">min</span>
                    </div>
                </div>
                <div class="pomo-setting-row">
                    <label for="pomo-custom-short">Short Break</label>
                    <div class="pomo-setting-input-wrap">
                        <button class="pomo-stepper" data-target="pomo-custom-short" data-dir="-1">−</button>
                        <input type="number" id="pomo-custom-short" class="pomo-setting-input" value="5" min="1"
                            max="60" />
                        <button class="pomo-stepper" data-target="pomo-custom-short" data-dir="1">+</button>
                        <span class="pomo-setting-unit">min</span>
                    </div>
                </div>
                <div class="pomo-setting-row">
                    <label for="pomo-custom-long">Long Break</label>
                    <div class="pomo-setting-input-wrap">
                        <button class="pomo-stepper" data-target="pomo-custom-long" data-dir="-1">−</button>
                        <input type="number" id="pomo-custom-long" class="pomo-setting-input" value="15" min="1"
                            max="60" />
                        <button class="pomo-stepper" data-target="pomo-custom-long" data-dir="1">+</button>
                        <span class="pomo-setting-unit">min</span>
                    </div>
                </div>
                <button class="pomo-apply-btn" id="pomo-apply-custom">Apply Custom</button>
            </div>

            <div class="pomo-ring-container">
                <svg class="pomo-ring" width="100" height="100" viewBox="0 0 100 100">
                    <circle class="pomo-ring-bg" cx="50" cy="50" r="42" />
                    <circle class="pomo-ring-fill" id="pomo-ring-fill" cx="50" cy="50" r="42" stroke-dasharray="263.89"
                        stroke-dashoffset="0" />
                </svg>
            </div>
            <div class="timer-display" id="pomo-display">25:00</div>
            <div class="timer-label" id="pomo-label">Focus Session</div>
            <div class="timer-controls">
                <button class="timer-btn primary" id="pomo-start">Start</button>
                <button class="timer-btn" id="pomo-reset">Reset</button>
            </div>
            <div class="pomo-sessions" id="pomo-sessions">
                <div class="pomo-dot"></div>
                <div class="pomo-dot"></div>
                <div class="pomo-dot"></div>
                <div class="pomo-dot"></div>
            </div>
        </div>

        <!-- ====== STOPWATCH PANEL ====== -->
        <div class="panel stopwatch-panel" id="stopwatch-panel">
            <div class="panel-title">Stopwatch</div>
            <div class="timer-display" id="sw-display">00:00<span style="font-size:1.4rem;opacity:0.5">.00</span></div>
            <div class="timer-controls">
                <button class="timer-btn primary" id="sw-start">Start</button>
                <button class="timer-btn" id="sw-lap">Lap</button>
                <button class="timer-btn" id="sw-reset">Reset</button>
            </div>
            <div id="sw-laps"
                style="margin-top:0.7rem;max-height:100px;overflow-y:auto;font-size:0.7rem;color:var(--text-secondary);letter-spacing:0.05em;">
            </div>
        </div>

        <!-- ====== MUSIC PANEL (Firewatch OST) ====== -->
        <div class="panel music-panel" id="music-panel">
            <div class="music-mode-toggle">
                <button class="mode-btn active" id="mode-ost">OST</button>
                <button class="mode-btn" id="mode-lofi">Lofi Live</button>
            </div>

            <div class="panel-title" id="music-panel-title">OST</div>

            <!-- Now-playing area -->
            <div class="ost-now-playing">
                <div class="ost-visualizer" id="ost-visualizer">
                    <div class="music-bar"></div>
                    <div class="music-bar"></div>
                    <div class="music-bar"></div>
                    <div class="music-bar"></div>
                    <div class="music-bar"></div>
                </div>
                <div class="ost-track-info">
                    <span class="ost-track-name" id="ost-track-name">No track selected</span>
                    <span class="ost-track-number" id="ost-track-number">— / —</span>
                </div>
            </div>

            <!-- Progress bar -->
            <div class="ost-progress-wrap">
                <span class="ost-time" id="ost-time-current">0:00</span>
                <div class="ost-progress-bar" id="ost-progress-bar">
                    <div class="ost-progress-fill" id="ost-progress-fill"></div>
                    <div class="ost-progress-thumb" id="ost-progress-thumb"></div>
                </div>
                <span class="ost-time" id="ost-time-total">0:00</span>
            </div>

            <!-- Main controls -->
            <div class="ost-controls">
                <button class="ost-ctrl-btn" id="ost-shuffle" aria-label="Shuffle" title="Shuffle">
                    <svg viewBox="0 0 24 24">
                        <polyline points="16 3 21 3 21 8" />
                        <line x1="4" y1="20" x2="21" y2="3" />
                        <polyline points="21 16 21 21 16 21" />
                        <line x1="15" y1="15" x2="21" y2="21" />
                        <line x1="4" y1="4" x2="9" y2="9" />
                    </svg>
                </button>
                <button class="ost-ctrl-btn" id="ost-prev" aria-label="Previous track" title="Previous">
                    <svg viewBox="0 0 24 24">
                        <polygon points="19 20 9 12 19 4 19 20" />
                        <line x1="5" y1="19" x2="5" y2="5" />
                    </svg>
                </button>
                <button class="ost-play-btn" id="ost-play" aria-label="Play or pause">
                    <svg id="ost-play-icon" viewBox="0 0 24 24">
                        <polygon points="6,3 20,12 6,21" />
                    </svg>
                </button>
                <button class="ost-ctrl-btn" id="ost-next" aria-label="Next track" title="Next">
                    <svg viewBox="0 0 24 24">
                        <polygon points="5 4 15 12 5 20 5 4" />
                        <line x1="19" y1="5" x2="19" y2="19" />
                    </svg>
                </button>
                <button class="ost-ctrl-btn" id="ost-repeat" aria-label="Repeat" title="Repeat">
                    <svg viewBox="0 0 24 24">
                        <polyline points="17 1 21 5 17 9" />
                        <path d="M3 11V9a4 4 0 0 1 4-4h14" />
                        <polyline points="7 23 3 19 7 15" />
                        <path d="M21 13v2a4 4 0 0 1-4 4H3" />
                    </svg>
                </button>
            </div>

            <!-- Volume -->
            <div class="ost-volume">
                <svg viewBox="0 0 24 24">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                </svg>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="60" />
            </div>


            <!-- Track list (collapsed by default) -->
            <button class="ost-tracklist-toggle" id="ost-tracklist-toggle">
                <span id="tracklist-toggle-text">Track List</span>
                <svg viewBox="0 0 24 24">
                    <polyline points="6 9 12 15 18 9" />
                </svg>
            </button>
            <div class="ost-tracklist" id="ost-tracklist">
                <!-- populated by JS -->
            </div>
            <div class="lofi-tracklist" id="lofi-tracklist">
                <!-- populated by JS -->
            </div>
        </div>

        <!-- ====== BOTTOM-RIGHT CONTROLS ====== -->
        <div class="bottom-right-controls" id="bottom-right-controls">
            <!-- Fullscreen button -->
            <button class="fullscreen-btn" id="btn-fullscreen" aria-label="Toggle fullscreen">
                <svg id="fullscreen-icon" viewBox="0 0 24 24">
                    <polyline points="15 3 21 3 21 9" />
                    <polyline points="9 21 3 21 3 15" />
                    <line x1="21" y1="3" x2="14" y2="10" />
                    <line x1="3" y1="21" x2="10" y2="14" />
                </svg>
            </button>
            <!-- 12/24 hour toggle -->
            <div class="clock-format-toggle" id="clock-format-toggle">
                <span class="format-label active" id="format-12" data-format="12">12</span>
                <span class="format-label" id="format-24" data-format="24">24</span>
                <div class="format-slider" id="format-slider"></div>
            </div>
        </div>

        <!-- Search box -->
        <div id="searchBox">
          <form id="searchForm">
            <input
              type="text"
              id="searchInput"
              placeholder="Search Google..."
              autocomplete="off"
            />
          </form>
        </div>

    </main>

    <!-- ====== NOSCRIPT FALLBACK ====== -->
    <noscript>
        <div
            style="text-align:center;padding:3rem;color:#fff;background:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h1>Homepage - Dashboard</h1>
            <p>This is a JavaScript-enabled page. Please enable JavaScript to experience the full Dashboard.</p>
            <p>Inspired by Firewatch by Campo Santo. Features Firewatch sunset, night, and evening themes.</p>
        </div>
    </noscript>

    <!-- YouTube API will mount player in Music Panel -->

    <script src="script.js"></script>

</body>

</html>
